<body>

    <div class="card">
        <h2>Birim Dönüştürücü</h2>
        
        <label for="degerInput">Değer Giriniz:</label>
        <input type="number" id="degerInput" value="50">
        
        <label for="donusumTipi">Dönüşüm Tipi:</label>
        <select id="donusumTipi">
            <option value="c_f">Celsius -> Fahrenheit</option>
            <option value="m_km">Metre -> Kilometre</option>
            <option value="kg_g">Kilogram -> Gram</option>
        </select>
        
        <button onclick="donustur()">Hesapla</button>
        
        <div class="result-box" id="sonucEkrani">
            Sonuç: <span id="sonucDegeri">122</span>
        </div>
    </div>
